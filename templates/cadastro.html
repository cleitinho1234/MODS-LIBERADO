<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Blog Acessível</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 2px solid #333; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <main>
        <h1>Criar Conta</h1>
        <form action="/cadastro" method="post">
            <label for="email">Escolha um E-mail:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="senha">Crie uma Senha:</label>
            <input type="password" id="senha" name="senha" required>
            
            <button type="submit">CADASTRAR E ENTRAR</button>
        </form>
        <p><a href="/login">Já tem conta? Faça login.</a></p>
    </main>
</body>
</html>
