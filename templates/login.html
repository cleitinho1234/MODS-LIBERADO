<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Blog Acessível</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 2px solid #333; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #24292e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <main>
        <h1>Entrar no Blog</h1>
        <form action="/login" method="post">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required aria-label="Digite seu e-mail">
            
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required aria-label="Digite sua senha">
            
            <button type="submit">ENTRAR</button>
        </form>
        <p><a href="/cadastro">Não tem conta? Crie uma aqui.</a></p>
    </main>
</body>
</html>
